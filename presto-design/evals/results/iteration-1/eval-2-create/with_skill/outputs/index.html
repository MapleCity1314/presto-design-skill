<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marble — Team Knowledge, Kept Alive</title>
    <meta name="description" content="Marble is a lightweight knowledge base built for small engineering teams. No clutter. No outdated wikis. Just clean, fast, searchable documentation your team will actually use." />
    <meta name="theme-color" content="#f7f4ee" />

    <!-- Open Graph -->
    <meta property="og:title" content="Marble — Team Knowledge, Kept Alive" />
    <meta property="og:description" content="A lightweight knowledge base for small engineering teams who are tired of wikis nobody updates." />
    <meta property="og:type" content="website" />

    <!-- Preconnect for font performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Fraunces: optical-size variable serif — distinctive, slightly literary, warm.
      Used for display headings to give Marble a considered, editorial feel.

      DM Sans: clean humanist sans — readable, not generic.
      Used for body, UI labels, and navigation.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./index.css" />
  </head>
